<!DOCTYPE html>
<html5>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Santiago Conecta | Portal Municipal</title>
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="manifest.json" rel="manifest" />
    <link rel="icon" type="image/x-icon" href="" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link href="css/Style.css" rel="stylesheet" />

    <style>
        body { margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        .loading-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #4a148c, #880e4f, #d81b60, #ffb4a2);
            background-size: 300% 300%;
            animation: gradientBG 6s ease infinite;
            z-index: 9999;
        }
        .loader {
            width: 80px; height: 80px; border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.15);
            border-top: 4px solid #ffffff;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin-bottom: 24px; position: relative;
        }
        .inner-loader {
            position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px;
            border-radius: 50%; border: 3px solid rgba(255, 255, 255, 0.1);
            border-bottom: 3px solid #ffb4a2;
            animation: spin 1.5s reverse infinite;
        }
        .loading-text {
            color: #ffffff; font-size: 2rem; font-weight: 800;
            margin: 0; letter-spacing: -0.02em; text-align: center;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .loading-subtext {
            color: rgba(255, 255, 255, 0.9); font-size: 1.1rem; margin-top: 8px; font-weight: 400; text-align: center;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="loading-container">
            <div class="loader">
                <div class="inner-loader"></div>
            </div>
            <h1 class="loading-text">Santiago Conecta</h1>
            <p class="loading-subtext">Preparando tu experiencia municipal...</p>
        </div>
    </div>

    <div id="blazor-error-ui">
        Ha ocurrido un error inesperado en la aplicación.
        <a href="" class="reload">Recargar</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="js/chat.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js');</script>
    <style>
        #blazor-error-ui {
            background: lightyellow;
            bottom: 0;
            box-shadow: 0 -1px 2px rgba(0, 0, 0, 0.2);
            display: none;
            left: 0;
            padding: 0.6rem 1.25rem 0.7rem 1.25rem;
            position: fixed;
            width: 100%;
            z-index: 1000;
        }

            #blazor-error-ui .dismiss {
                cursor: pointer;
                position: absolute;
                right: 0.75rem;
                top: 0.5rem;
            }
    </style>
</body>

</html5>
