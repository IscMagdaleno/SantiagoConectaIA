    <link rel="stylesheet" href="assets/css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/SConecta/flex-slider.css" />
    <link rel="stylesheet" href="assets/css/SConecta/font-awesome.css" />
    <link rel="stylesheet" href="assets/css/SConecta/templatemo-softy-pinko.css" />
    <link rel="stylesheet" href="assets/css/app.css" />

</head>

<style>
    body { margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
    .loading-container {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: linear-gradient(135deg, #4a148c, #880e4f, #d81b60, #ffb4a2);
        background-size: 300% 300%;
        animation: gradientBG 6s ease infinite;
        z-index: 9999;
    }
    .loader {
        width: 80px; height: 80px; border-radius: 50%;
        border: 4px solid rgba(255, 255, 255, 0.15);
        border-top: 4px solid #ffffff;
        animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        margin-bottom: 24px; position: relative;
    }
    .inner-loader {
        position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px;
        border-radius: 50%; border: 3px solid rgba(255, 255, 255, 0.1);
        border-bottom: 3px solid #ffb4a2;
        animation: spin 1.5s reverse infinite;
    }
    .loading-text {
        color: #ffffff; font-size: 2rem; font-weight: 800;
        margin: 0; letter-spacing: -0.02em; text-align: center;
        text-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .loading-subtext {
        color: rgba(255, 255, 255, 0.9); font-size: 1.1rem; margin-top: 8px; font-weight: 400; text-align: center;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
</style>

<body>
    <div id="app">
        <div class="loading-container">
            <div class="loader">
                <div class="inner-loader"></div>
            </div>
            <h1 class="loading-text">Santiago Conecta</h1>
            <p class="loading-subtext">Preparando tu experiencia municipal...</p>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="js/culture.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <!-- Leaflet JS (Mapas Gratuitos) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="assets/js/jquery-2.1.0.min.js"></script>
    <script src="assets/js/popper.js"></script>
    <script src="assets/js/bootstrap.min.js"></script>
    <script src="assets/js/scrollreveal.min.js"></script>
    <script src="assets/js/waypoints.min.js"></script>
    <script src="assets/js/jquery.counterup.min.js"></script>
    <script src="assets/js/imgfix.min.js"></script>
    <script src="assets/js/custom.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js');</script>
</body>

</html>
