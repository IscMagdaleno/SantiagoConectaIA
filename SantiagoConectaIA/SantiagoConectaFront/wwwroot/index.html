    <!-- Script dinámico para la barra de estado de Android (PWA) -->
    <script>
        (function() {
            const metaThemeColor = document.querySelector('meta[name="theme-color"]');
            if (!metaThemeColor) return;

            // La animación CSS hace un paneo de 0% a 100% y luego regresa a 0% en 15 segundos.
            // Por lo tanto, los colores en la esquina superior izquierda hacen un viaje de "ida y vuelta".
            // Secuencia correcta: Guindo -> Rosa -> Morado -> Rosa -> (repite a Guindo)
            const colors = [
                [136, 14, 79],   // #880e4f (Guindo oscuro - Inicio 0s)
                [216, 27, 96],   // #d81b60 (Rosa fuerte - Medio viaje 3.75s)
                [74, 20, 140],   // #4a148c (Morado oscuro - Extremo 7.5s)
                [216, 27, 96]    // #d81b60 (Rosa fuerte - De regreso 11.25s)
            ];

            let startTime = performance.now();
            const duration = 15000; // 15 segundos para el ciclo completo

            function updateThemeColor(currentTime) {
                if (window.scrollY > 80) {
                    if (metaThemeColor.getAttribute('content') !== '#ffffff') {
                        metaThemeColor.setAttribute('content', '#ffffff');
                    }
                } else {
                    const elapsed = (currentTime - startTime) % duration;
                    
                    // Como la animación CSS usa 'ease', podemos hacer que el progreso no sea 100% lineal 
                    // usando una curva de seno (para que frene suavemente en los extremos).
                    let progress = elapsed / duration;
                    // Ajuste de "ease" matemático (opcional, pero lo hace perfecto):
                    // progress = 0.5 - 0.5 * Math.cos(progress * 2 * Math.PI); // Descomentar para ease absoluto

                    const totalSegments = colors.length;
                    const segmentProgress = (progress * totalSegments) % 1;
                    const currentIndex = Math.floor(progress * totalSegments);
                    const nextIndex = (currentIndex + 1) % totalSegments;

                    const c1 = colors[currentIndex];
                    const c2 = colors[nextIndex];

                    const r = Math.round(c1[0] + (c2[0] - c1[0]) * segmentProgress);
                    const g = Math.round(c1[1] + (c2[1] - c1[1]) * segmentProgress);
                    const b = Math.round(c1[2] + (c2[2] - c1[2]) * segmentProgress);

                    const hex = "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1);
                    metaThemeColor.setAttribute('content', hex);
                }
                requestAnimationFrame(updateThemeColor);
            }
            requestAnimationFrame(updateThemeColor);
        })();
    </script>
