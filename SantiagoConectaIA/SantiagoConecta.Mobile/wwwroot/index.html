<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Santiago Conecta Mobile</title>
    <base href="/" />
    <link rel="stylesheet" href="assets/css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/SConecta/flex-slider.css" />
    <link rel="stylesheet" href="assets/css/SConecta/font-awesome.css" />
    <link rel="stylesheet" href="assets/css/SConecta/templatemo-softy-pinko.css" />
    <link rel="stylesheet" href="assets/css/app.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="SantiagoConecta.Mobile.styles.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .loading-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #4a148c, #880e4f, #d81b60, #ffb4a2);
            background-size: 300% 300%;
            animation: gradientBG 6s ease infinite;
            z-index: 9999;
        }
        .loader {
            width: 80px; height: 80px; border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.15);
            border-top: 4px solid #ffffff;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin-bottom: 24px; position: relative;
        }
        .inner-loader {
            position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px;
            border-radius: 50%; border: 3px solid rgba(255, 255, 255, 0.1);
            border-bottom: 3px solid #ffb4a2;
            animation: spin 1.5s reverse infinite;
        }
        .loading-text {
            color: #ffffff; font-size: 2rem; font-weight: 800;
            margin: 0; letter-spacing: -0.02em; text-align: center;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .loading-subtext {
            color: rgba(255, 255, 255, 0.9); font-size: 1.1rem; margin-top: 8px; font-weight: 400; text-align: center;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>

<body>
    <div class="status-bar-safe-area"></div>

    <div id="app">
        <div class="loading-container">
            <div class="loader">
                <div class="inner-loader"></div>
            </div>
            <h1 class="loading-text">Santiago Conecta</h1>
            <p class="loading-subtext">Preparando tu experiencia móvil...</p>
        </div>
    </div>

    <div id="blazor-error-ui">
        Ocurrió un error no controlado.
        <a href="" class="reload">Recargar</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="js/culture.js"></script>
    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="assets/js/jquery-2.1.0.min.js"></script>
    <script src="assets/js/popper.js"></script>
    <script src="assets/js/bootstrap.min.js"></script>
    <script src="assets/js/scrollreveal.min.js"></script>
    <script src="assets/js/waypoints.min.js"></script>
    <script src="assets/js/jquery.counterup.min.js"></script>
    <script src="assets/js/imgfix.min.js"></script>
    <script src="assets/js/custom.js"></script>
</body>

</html>
